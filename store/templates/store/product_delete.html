{% extends "base.html" %}

{% block title %}Удалить товар{% endblock %}

{% block content %}
<h1>Удалить товар</h1>
<p>Вы уверены, что хотите удалить товар "{{ product.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Да, удалить</button>
</form>
<a href="{% url 'store:product_list' %}">Нет, отменить</a>
{% endblock %}
